name: Mise à jour quotidienne des données BRVM

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  collect-and-update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4
      
    - name: Installer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Installer les dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Exécuter le script de collecte
      run: python collect_brvm_data.py
      
    - name: Enregistrer et pousser les nouvelles données
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/brvm_market_data.csv
        git commit -m "Données mises à jour automatiquement le $(date +'%Y-%m-%d')" || echo "Aucun changement à commit"
        git push
